<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Streamer</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome untuk Icon (Discord, YouTube, Instagram dll) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- KUSTOMISASI ANIMASI ADVANCED --- */

        /* 1. Efek Background Gradasi Linear Berjalan */
        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-bg-gradient {
            background-size: 200% 200%;
            animation: gradientBg 15s ease infinite;
        }

        /* 2. Animasi Gelombang Cairan (Liquid Wave) */
        @keyframes liquid {
            0% { border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%; transform: rotate(0deg); }
            50% { border-radius: 60% 40% 40% 60% / 60% 60% 40% 40%; transform: rotate(180deg); }
            100% { border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%; transform: rotate(360deg); }
        }
        .animate-liquid-1 {
            animation: liquid 8s linear infinite;
        }
        .animate-liquid-2 {
            animation: liquid 12s linear infinite reverse;
        }

        /* 3. Animasi Muncul dari Bawah (Fade In Up) */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            opacity: 0; /* Mulai dari hidden sebelum animasi jalan */
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        /* Delay untuk masing-masing elemen agar muncul bergantian */
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
        .delay-4 { animation-delay: 0.8s; }

        /* 4. Tracing Outline Glow Effect saat Hover */
        .glow-btn .trace-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, #38bdf8, #3b82f6, transparent);
            transition: all 0.5s ease;
        }
        /* Garis Atas */
        .glow-btn .trace-top { top: 0; left: -100%; width: 100%; height: 2px; }
        .glow-btn:hover .trace-top { left: 100%; transition: 0.6s linear; }
        /* Garis Kanan */
        .glow-btn .trace-right { top: -100%; right: 0; width: 2px; height: 100%; }
        .glow-btn:hover .trace-right { top: 100%; transition: 0.6s linear; transition-delay: 0.15s; }
        /* Garis Bawah */
        .glow-btn .trace-bottom { bottom: 0; right: -100%; width: 100%; height: 2px; }
        .glow-btn:hover .trace-bottom { right: 100%; transition: 0.6s linear; transition-delay: 0.3s; }
        /* Garis Kiri */
        .glow-btn .trace-left { bottom: -100%; left: 0; width: 2px; height: 100%; }
        .glow-btn:hover .trace-left { bottom: 100%; transition: 0.6s linear; transition-delay: 0.45s; }
    </style>
</head>
<body class="bg-gradient-to-tr from-[#020617] via-[#0f172a] to-[#1e1b4b] animate-bg-gradient min-h-screen flex flex-col justify-between text-slate-200 font-sans overflow-x-hidden">

    <!-- CONTAINER UTAMA -->
