<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimoon's Link Tree</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome untuk Icon (Discord, YouTube, Instagram dll) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-tr from-[#020617] via-[#0f172a] to-[#1e1b4b] animate-bg-gradient min-h-screen flex flex-col justify-between text-slate-200 font-sans overflow-x-hidden">

    <!-- CONTAINER UTAMA -->
    <main class="w-full max-w-md mx-auto px-6 pt-16 pb-24 flex flex-col items-center flex-grow">
        
        <!-- ================= BAGIAN ATAS: FOTO PROFIL & LIQUID WAVE ================= -->
        <div class="relative w-40 h-40 flex items-center justify-center mb-6 animate-fade-in-up">
            <!-- Gelombang Cairan Lapisan 1 (Outer Glow) -->
            <div class="absolute inset-0 bg-gradient-to-tr from-cyan-500 via-blue-600 to-indigo-500 opacity-40 blur-md animate-liquid-1"></div>
            <!-- Gelombang Cairan Lapisan 2 (Inner Wave) -->
            <div class="absolute inset-2 bg-gradient-to-bl from-indigo-500 via-purple-600 to-cyan-400 opacity-60 animate-liquid-2"></div>
            
            <!-- Foto Profil Asli (Tetap Lingkaran Sempurna) -->
            <div class="absolute inset-4 rounded-full overflow-hidden border-2 border-blue-400/50 shadow-[0_0_20px_rgba(56,189,248,0.3)] bg-[#0f172a]">
                <!-- Ganti src dengan link foto profilmu sendiri -->
                <img src="Foto.jpg" alt="Foto Profil" class="w-full h-full object-cover">
            </div>
        </div>

        <!-- Nama dan Bio Singkat (Opsional, sangat direkomendasikan) -->
        <div class="text-center mb-10 animate-fade-in-up delay-1">
            <h1 class="text-2xl font-bold text-white tracking-wider mb-2">@Kimoon</h1>
            <p class="text-sm text-sky-400 font-medium">Holaa</p>
        </div>

        <!-- ================= BAGIAN TENGAH: FORM / TOMBOL LINK ================= -->
        <div class="w-full space-y-4">
            
            <!-- TOMBOL 1: DISCORD -->
            <button type="button" data-link-key="privateServer" class="glow-btn animate-fade-in-up delay-2 relative block w-full py-4 bg-slate-900/60 border border-slate-800 rounded-xl overflow-hidden text-center font-semibold tracking-wide text-slate-300 transition-all duration-300 hover:bg-slate-900/90 hover:text-sky-400 hover:scale-[1.02] hover:shadow-[0_0_25px_rgba(56,189,248,0.25)] cursor-pointer">
                <!-- Jalur Garis Tracing -->
                <span class="trace-line trace-top"></span>
                <span class="trace-line trace-right"></span>
                <span class="trace-line trace-bottom"></span>
                <span class="trace-line trace-left"></span>
                <!-- Konten Tombol -->
                <span class="flex items-center justify-center gap-3 relative z-10">
                    <i class="fab fa-roblox text-xl"></i> Join Private Server Evade
                </span>
            </button>

            <!-- TOMBOL 2: DONATE -->
            <button type="button" data-link-key="donate" class="glow-btn animate-fade-in-up delay-3 relative block w-full py-4 bg-slate-900/60 border border-slate-800 rounded-xl overflow-hidden text-center font-semibold tracking-wide text-slate-300 transition-all duration-300 hover:bg-slate-900/90 hover:text-sky-400 hover:scale-[1.02] hover:shadow-[0_0_25px_rgba(56,189,248,0.25)] cursor-pointer">
                <span class="trace-line trace-top"></span>
                <span class="trace-line trace-right"></span>
                <span class="trace-line trace-bottom"></span>
                <span class="trace-line trace-left"></span>
                <span class="flex items-center justify-center gap-3 relative z-10">
                    <i class="fas fa-heart text-xl text-rose-500"></i> Dukung / Donasi
                </span>
            </button>

            <!-- TOMBOL 3: YOUTUBE / STREAM PLATFORM -->
            
            <!-- TOMBOL 4: TIKTOK -->
            

        </div>
    </main>

    <!-- ================= BAGIAN BAWAH: FOOTER / COPYRIGHT ================= -->
    <footer class="w-full text-center py-6 text-xs text-slate-500 tracking-wider animate-fade-in-up" style="animation-delay: 1.2s;">
        <p>&copy; 2026 Lyunarch. All Rights Reserved.</p>
        <p class="mt-2">Dibuat oleh 
            <a href="https://www.instagram.com/" target="_blank" class="text-slate-400 hover:text-sky-400 transition-colors duration-300 inline-flex items-center gap-1 font-medium">
                <i class="fab fa-instagram"></i> 
            </a>
        </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
